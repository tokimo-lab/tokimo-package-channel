name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      # Checkout this repo to a named subdirectory so path deps resolve correctly.
      # The layout mirrors the monorepo: channel/ rust-client-api/ tokimo-package-web-fetch/
      - uses: actions/checkout@v4
        with:
          path: channel

      # rust-client-api lives in the main monorepo (not a standalone repo).
      # Sparse-checkout just that package, then move it to the expected sibling path.
      # Requires a PAT with read:contents on tokimo-lab/tokimo stored as GH_PAT secret.
      - uses: actions/checkout@v4
        with:
          repository: tokimo-lab/tokimo
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: packages/rust-client-api
          sparse-checkout-cone-mode: true
          filter: blob:none
          path: tokimo-main

      - name: Place rust-client-api at expected path
        shell: bash
        run: mv tokimo-main/packages/rust-client-api rust-client-api

      # rust-client-api depends on tokimo-package-web-fetch via path dep.
      - uses: actions/checkout@v4
        with:
          repository: tokimo-lab/tokimo-package-web-fetch
          path: tokimo-package-web-fetch

      # rust-client-api uses `[lints] workspace = true`. When checked out
      # standalone it has no parent workspace, so cargo fails to resolve lints.
      # This synthetic workspace root at $GITHUB_WORKSPACE lets rust-client-api
      # walk up its directory tree and find the workspace it needs.
      # channel/ and tokimo-package-web-fetch/ are excluded because they each
      # have their own [workspace] root and must not be nested.
      - name: Create synthetic workspace for rust-client-api lint resolution
        shell: bash
        run: |
          cat > Cargo.toml << 'CARGO_EOF'
          [workspace]
          members = ["rust-client-api"]
          exclude = ["channel", "tokimo-package-web-fetch"]
          resolver = "2"

          [workspace.lints.rust]
          unsafe_code     = "warn"
          unused_must_use = "deny"

          [workspace.lints.clippy]
          all                       = { level = "warn", priority = -1 }
          pedantic                  = { level = "warn", priority = -1 }
          wildcard_imports          = "allow"
          module_name_repetitions   = "allow"
          must_use_candidate        = "allow"
          missing_errors_doc        = "allow"
          missing_panics_doc        = "allow"
          items_after_statements    = "allow"
          struct_excessive_bools    = "allow"
          similar_names             = "allow"
          many_single_char_names    = "allow"
          unnecessary_literal_bound = "allow"
          doc_markdown              = "allow"
          ref_option                = "allow"
          fn_params_excessive_bools = "allow"
          needless_pass_by_value    = "allow"
          cast_possible_wrap        = "allow"
          cast_possible_truncation  = "allow"
          cast_precision_loss       = "allow"
          cast_sign_loss            = "allow"
          unwrap_in_result          = "warn"
          panic                     = "warn"
          todo                      = "warn"
          dbg_macro                 = "warn"
          print_stdout              = "warn"
          print_stderr              = "warn"
          CARGO_EOF

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: channel

      - name: cargo build
        working-directory: channel
        run: cargo build --lib --bins --tests

      - name: cargo test
        working-directory: channel
        run: cargo test --lib --bins

  lint:
    name: fmt & clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: channel

      - uses: actions/checkout@v4
        with:
          repository: tokimo-lab/tokimo
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: packages/rust-client-api
          sparse-checkout-cone-mode: true
          filter: blob:none
          path: tokimo-main

      - name: Place rust-client-api at expected path
        shell: bash
        run: mv tokimo-main/packages/rust-client-api rust-client-api

      - uses: actions/checkout@v4
        with:
          repository: tokimo-lab/tokimo-package-web-fetch
          path: tokimo-package-web-fetch

      - name: Create synthetic workspace for rust-client-api lint resolution
        shell: bash
        run: |
          cat > Cargo.toml << 'CARGO_EOF'
          [workspace]
          members = ["rust-client-api"]
          exclude = ["channel", "tokimo-package-web-fetch"]
          resolver = "2"

          [workspace.lints.rust]
          unsafe_code     = "warn"
          unused_must_use = "deny"

          [workspace.lints.clippy]
          all                       = { level = "warn", priority = -1 }
          pedantic                  = { level = "warn", priority = -1 }
          wildcard_imports          = "allow"
          module_name_repetitions   = "allow"
          must_use_candidate        = "allow"
          missing_errors_doc        = "allow"
          missing_panics_doc        = "allow"
          items_after_statements    = "allow"
          struct_excessive_bools    = "allow"
          similar_names             = "allow"
          many_single_char_names    = "allow"
          unnecessary_literal_bound = "allow"
          doc_markdown              = "allow"
          ref_option                = "allow"
          fn_params_excessive_bools = "allow"
          needless_pass_by_value    = "allow"
          cast_possible_wrap        = "allow"
          cast_possible_truncation  = "allow"
          cast_precision_loss       = "allow"
          cast_sign_loss            = "allow"
          unwrap_in_result          = "warn"
          panic                     = "warn"
          todo                      = "warn"
          dbg_macro                 = "warn"
          print_stdout              = "warn"
          print_stderr              = "warn"
          CARGO_EOF

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: channel

      - name: cargo fmt
        working-directory: channel
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: channel
        run: cargo clippy --lib --bins --tests -- -D warnings
